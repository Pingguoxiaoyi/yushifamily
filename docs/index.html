<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>于氏家族祖坟地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 样式保持不变，同之前的代码 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        .search-box {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            background: white;
            padding: 8px 12px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            gap: 8px;
        }
        .search-box input { flex: 1; border: none; outline: none; font-size: 16px; }
        .search-box button { background: #4CAF50; color: white; border: none; border-radius: 20px; padding: 6px 14px; cursor: pointer; }
        .info-card {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: none;
            z-index: 1001;
            max-height: 70%;
            overflow-y: auto;
        }
        .close-btn { float: right; background: #f44336; color: white; border: none; border-radius: 20px; padding: 4px 12px; cursor: pointer; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .nav-btn { flex: 1; background: #2196F3; color: white; text-align: center; padding: 8px; border-radius: 30px; text-decoration: none; font-size: 14px; }
        .nav-btn.baidu { background: #E94E1B; }
        .photo-container img { max-width: 100%; border-radius: 12px; max-height: 200px; object-fit: cover; margin-top: 10px; }
        @media (min-width: 768px) { .info-card, .search-box { width: 380px; left: auto; right: 20px; } }
        <style>
    /* 新增：去掉标记点白色方框 */
        .custom-icon {
        background: transparent !important;
        border: none !important;
    }
</style>
    </style>
</head>
<body>
<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 搜索先人姓名或位置...">
    <button onclick="searchGrave()">定位</button>
</div>
<div id="map"></div>
<div id="infoCard" class="info-card">
    <button class="close-btn" onclick="hideCard()">关闭</button>
    <div id="cardContent"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/coordtransform@2.1.2/index.min.js"></script>
<script>
    // ==================== 配置参数 ====================
    const satelliteImage = 'familymap.jpeg';   // 卫星图文件（放在同目录）
    const imageBounds = [[28.664081,105.202331], [28.708656, 105.275115]];  // 图片边界
    
    let map;
    let markers = {};
    let graves = [];
    
    // ==================== 坐标转换函数 ====================
    var pi = 3.14159265358979323846;
    var a = 6378245.0;
    var ee = 0.00669342162296594323;
    
    function outOfChina(lat, lon) {
        if (lon < 72.004 || lon > 137.8347) return true;
        if (lat < 0.8293 || lat > 55.8271) return true;
        return false;
    }
    
    function transformLat(x, y) {
        var ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
        ret += (20.0 * Math.sin(6.0 * x * pi) + 20.0 * Math.sin(2.0 * x * pi)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(y * pi) + 40.0 * Math.sin(y / 3.0 * pi)) * 2.0 / 3.0;
        ret += (160.0 * Math.sin(y / 12.0 * pi) + 320 * Math.sin(y * pi / 30.0)) * 2.0 / 3.0;
        return ret;
    }
    
    function transformLon(x, y) {
        var ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
        ret += (20.0 * Math.sin(6.0 * x * pi) + 20.0 * Math.sin(2.0 * x * pi)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(x * pi) + 40.0 * Math.sin(x / 3.0 * pi)) * 2.0 / 3.0;
        ret += (150.0 * Math.sin(x / 12.0 * pi) + 300.0 * Math.sin(x / 30.0 * pi)) * 2.0 / 3.0;
        return ret;
    }
    
    function wgs84ToGcj02(wgsLat, wgsLon) {
        if (outOfChina(wgsLat, wgsLon)) return [wgsLat, wgsLon];
        var dLat = transformLat(wgsLon - 105.0, wgsLat - 35.0);
        var dLon = transformLon(wgsLon - 105.0, wgsLat - 35.0);
        var radLat = wgsLat / 180.0 * pi;
        var magic = Math.sin(radLat);
        magic = 1 - ee * magic * magic;
        var sqrtMagic = Math.sqrt(magic);
        dLat = (dLat * 180.0) / ((a * (1 - ee)) / (magic * sqrtMagic) * pi);
        dLon = (dLon * 180.0) / (a / sqrtMagic * Math.cos(radLat) * pi);
        return [wgsLat + dLat, wgsLon + dLon];
    }
    
    function toDMS(value, isLat) {
        var absolute = Math.abs(value);
        var degrees = Math.floor(absolute);
        var minutesNotTrunc = (absolute - degrees) * 60;
        var minutes = Math.floor(minutesNotTrunc);
        var seconds = (minutesNotTrunc - minutes) * 60;
        seconds = Math.round(seconds * 100) / 100;
        var direction = isLat ? (value >= 0 ? 'N' : 'S') : (value >= 0 ? 'E' : 'W');
        return degrees + '°' + minutes + '′' + seconds + '″' + direction;
    }
    
    function formatLatLngDMS(lat, lng) {
        return toDMS(lat, true) + ' ' + toDMS(lng, false);
    }
    
    // ==================== 初始化地图 ====================
    function initMap() {
        map = L.map('map').setView([28.6798, 105.2484], 16);
        L.imageOverlay(satelliteImage, imageBounds, { opacity: 1.0, attribution: '自制卫星图' }).addTo(map);
        map.fitBounds(imageBounds);
        setTimeout(() => map.invalidateSize(), 200);
        L.control.scale({ metric: true, imperial: false }).addTo(map);
        map.on('click', () => hideCard());
    }
    
    // ==================== 添加标记点 ====================
    function getIcon(branch) {
        const colorMap = { '大房': '#E74C3C', '二房': '#27AE60', '三房': '#F39C12', '四房': '#9B59B6' };
        const color = colorMap[branch] || '#2E86C1';
        return L.divIcon({
            html: `<div style="background-color:${color}; width:14px; height:14px; border-radius:50%; border:2px solid white; box-shadow:0 0 4px black;"></div>`,
            iconSize: [18, 18]
        });
    }
    
    function addMarkers() {
        graves.forEach(grave => {
            var marker = L.marker([grave.lat, grave.lng], { icon: getIcon(grave.branch) })
                .addTo(map)
                .bindPopup(`<b>${grave.name}</b><br>${grave.desc.substring(0, 30)}...<br><a href="#" onclick="showDetail(${grave.id}); return false;">查看详情 & 导航</a>`);
            markers[grave.id] = marker;
        });
    }
    
    // ==================== 详情卡片 ====================
    window.showDetail = function(id) {
        var g = graves.find(x => x.id === id);
        if (!g) return;
        
        var gcj = wgs84ToGcj02(g.lat, g.lng);
        var gcjLat = gcj[0], gcjLng = gcj[1];
        var bd = coordtransform.gcj02tobd09(gcjLng, gcjLat);
        var bdLat = bd[1], bdLng = bd[0];
        var dms = formatLatLngDMS(g.lat, g.lng);
        
        let photoHtml = '';
        if (g.photo && g.photo.trim() !== '') {
            photoHtml = `<div class="photo-container"><img src="${g.photo}" alt="坟头照片" onerror="this.style.display='none'"></div>`;
        }
        
        const gaodeUrl = `https://uri.amap.com/marker?position=${gcjLng},${gcjLat}&name=${encodeURIComponent(g.name)}`;
        const baiduUrl = `https://api.map.baidu.com/marker?location=${bdLat},${bdLng}&title=${encodeURIComponent(g.name)}&content=${encodeURIComponent(g.desc)}&output=html&coord_type=bd09ll`;
        const appleUrl = `http://maps.apple.com/?daddr=${gcjLat},${gcjLng}&q=${encodeURIComponent(g.name)}`;
        
        const html = `
            <h3>${g.name}</h3>
            <p><strong>📌 位置：</strong>${g.desc}</p>
            <p><strong>🌐 经纬度：</strong>${dms}</p>
            <p><strong>👨‍👩‍👧‍👦 房头：</strong>${g.branch || '—'}</p>
            <p><strong>📜 辈分：</strong>${g.generation || '—'}</p>
            ${photoHtml}
            <div class="nav-buttons">
                <a href="${gaodeUrl}" class="nav-btn" target="_blank">🗺️ 高德导航</a>
                <a href="${baiduUrl}" class="nav-btn baidu" target="_blank">📍 百度导航</a>
                <a href="${appleUrl}" class="nav-btn" target="_blank">📱 苹果地图</a>
            </div>
        `;
        document.getElementById('cardContent').innerHTML = html;
        document.getElementById('infoCard').style.display = 'block';
    };
    
    window.hideCard = function() {
        document.getElementById('infoCard').style.display = 'none';
    };
    
    // ==================== 搜索功能 ====================
    window.searchGrave = function() {
        var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        if (keyword === '') return;
        var found = false;
        for (var i = 0; i < graves.length; i++) {
            var g = graves[i];
            if (g.name.toLowerCase().includes(keyword) || g.desc.toLowerCase().includes(keyword)) {
                map.setView([g.lat, g.lng], 18);
                markers[g.id].openPopup();
                found = true;
                break;
            }
        }
        if (!found) alert('未找到匹配的坟头，请检查名称或描述。');
    };
    
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchGrave();
    });
    
    // ==================== 启动应用 ====================
    fetch('graves.json')
        .then(response => response.json())
        .then(data => {
            graves = data;
            initMap();
            addMarkers();
        })
        .catch(error => console.error('加载 graves.json 失败:', error));
</script>
</body>
</html>
